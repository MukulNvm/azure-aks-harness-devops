pipeline:
  name: devops-harness-aks
  identifier: devops_harness_aks
  projectIdentifier: devopsharnessaks
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: github_mukulnvm
        repoName: azure-aks-harness-devops
        build: <+input>
  stages:
    - stage:
        name: CI
        identifier: CI
        description: Build and push backend and frontend images to ACR
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: aks_ci
              namespace: harness-ci
              automountServiceAccountToken: true
              os: Linux
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: build_backend
                  identifier: build_backend
                  spec:
                    connectorRef: acr_devopsharnessy8v9wc
                    repo: acrdevopsharnessy8v9wc.azurecr.io/backend
                    tags:
                      - "1.0.0"
                    dockerfile: applications/backend/Dockerfile
                    context: applications/backend
              - step:
                  type: BuildAndPushDockerRegistry
                  name: build_frontend
                  identifier: build_frontend
                  spec:
                    connectorRef: acr_devopsharnessy8v9wc
                    repo: acrdevopsharnessy8v9wc.azurecr.io/frontend
                    tags:
                      - "1.0.0"
                    dockerfile: applications/frontend/Dockerfile
                    context: applications/frontend

    - stage:
        name: CD
        identifier: CD
        description: Deploy Kubernetes manifests to AKS
        type: Deployment
        spec:
          deploymentType: Kubernetes
          serviceConfig:
            service:
              name: devops-harness-aks-service
              identifier: devops_harness_aks_service
            serviceDefinition:
              type: Kubernetes
              spec:
                manifests:
                  - manifest:
                      identifier: devops_harness_manifests
                      type: K8sManifest
                      spec:
                        store:
                          type: Github
                          spec:
                            connectorRef: github_mukulnvm
                            gitFetchType: Branch
                            repoName: azure-aks-harness-devops
                            branch: main
                            folderPath: kubernetes
                        skipResourceVersioning: false
          infrastructure:
            environment:
              name: production
              identifier: production
              type: Production
            infrastructureDefinition:
              type: KubernetesDirect
              spec:
                connectorRef: aks_prod
                namespace: production
                releaseName: devops-harness-aks
            allowSimultaneousDeployments: false
          execution:
            steps:
              - step:
                  type: K8sRollingDeploy
                  name: rollout
                  identifier: rollout
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
                  timeout: 15m
            rollbackSteps:
              - step:
                  type: K8sRollingRollback
                  name: rollback
                  identifier: rollback
                  spec:
                    pruningEnabled: false
                  timeout: 10m
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
